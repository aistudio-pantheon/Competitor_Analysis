title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        ## ❓ Ask a question
        About the data, methodology, or any metric you're not sure how to interpret.

  - type: textarea
    id: question
    attributes:
      label: What's your question?
    validations:
      required: true

  - type: input
    id: context
    attributes:
      label: Where in the dashboard?
      placeholder: "e.g. Audience tab · Peer-Show Tier-Mix Benchmarks"
    validations:
      required: false
